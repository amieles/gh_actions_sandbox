name: Multiline env test

on:
  push:
    branches:
      - main

jobs:
  env_var_test:
    runs-on: ubuntu-latest

    env:
      DT_LAG: >-
        ${{ 
          github.ref_name == 'main' && '8 minutes' || 
          '12 hours' 
        }}
      DT_LAG2: '12 hours'
      ENV_NAME: >-
        ${{ 
          github.ref_name == 'main' && vars.PROD_NAME || 
          'DEV' 
        }}

    steps:

      - name: print env vars
        run: |
          echo "hello: ${DT_LAG}"
          echo "original ${DT_LAG2}"
          echo "env_name: ${ENV_NAME}"
